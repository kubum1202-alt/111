<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2D BATTLE</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="intro-screen">
  <h1>🔥 2D BATTLE 🔥</h1>

  <div class="input-group">
    <label>적 이름</label>
    <input 입력="text" id="enemy-name-input" placeholder="보스 이름 (기본: 마왕)">
  </div>

  <div class="input-group">
    <label>적 얼굴</label>
    <input 입력="text" id="boss-emoji-input" value="😈">
  </div>

  <button id="start-btn">게임 시작</button>
</div>

<div id="game-container" class="hidden">
  <div id="game-ui">
    <div class="health-container">
      <div class="name-tag">플레이어</div>
      <div class="health-bar-bg">
        <div id="player-health" class="health-bar-fill"></div>
      </div>
    </div>

    <div class="health-container enemy-ui">
      <div id="enemy-name-display" class="name-tag">적</div>
      <div class="health-bar-bg">
        <div id="enemy-health" class="health-bar-fill"></div>
      </div>
    </div>
  </div>

  <canvas id="game-canvas"></canvas>

  <div id="result-screen" class="hidden">
    <h2 id="result-message">승리!</h2>
    <button id="restart-btn">다시 하기</button>
  </div>

  <div id="mobile-controls">
    <button id="attack">공격</button>
  </div>
</div>

<script src="script.js" defer></script>
</body>
</html>
